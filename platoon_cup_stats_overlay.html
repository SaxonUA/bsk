<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoT Platoon Cup Stats Overlay</title>

  <style>
    :root {
      --bg-1: rgba(15, 17, 22, 0.95);
      --bg-2: rgba(27, 31, 40, 0.96);

      --line: rgba(255, 255, 255, 0.10);
      --text: #f6f7fb;

      --gold: #ffb300;
      --gold-2: #ff7a00;
      --gold-soft: rgba(255, 140, 0, 0.18);

      --green: #24ff6d;
      --green-soft: rgba(36, 255, 109, 0.16);

      --red: #ff344c;
      --red-soft: rgba(255, 52, 76, 0.15);

      --blue: #78a7ff;
      --blue-soft: rgba(120, 167, 255, 0.14);

      --cyan: #4cecff;
      --cyan-soft: rgba(76, 236, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .overlay {
      position: relative;
      width: 640px;
      height: 640px;
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,0.05), transparent 24%),
        radial-gradient(circle at 90% 85%, rgba(255,150,0,0.08), transparent 26%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      box-shadow:
        0 22px 50px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(126deg, transparent 0 74%, rgba(255,255,255,0.03) 74.4%, transparent 75%),
        linear-gradient(180deg, rgba(255,255,255,0.025), transparent 28%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 24px 28px 26px;
    }

    .kicker {
      color: #b7bdc8;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header {
      margin-top: 8px;
      min-height: 118px;
    }

    .title {
      display: -webkit-box;
      overflow: hidden;
      color: #ffffff;
      font-size: 38px;
      font-weight: 1000;
      line-height: 1.04;
      letter-spacing: 0.2px;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255,255,255,0.08);
      overflow-wrap: anywhere;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .title.long-title {
      font-size: 32px;
      line-height: 1.08;
    }

    .map-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: 100%;
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(76, 236, 255, 0.2);
      background: rgba(76, 236, 255, 0.08);
      color: #d8fbff;
      font-size: 18px;
      font-weight: 800;
    }

    .map-pill span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .stat-card {
      position: relative;
      min-height: 108px;
      overflow: hidden;
      padding: 16px 18px 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      display: flex;
      flex-direction: column;
    }

    .stat-card::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 3px;
      background: currentColor;
      opacity: 0.95;
    }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stat-title {
      color: #b2bac4;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.55px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .mini-dot {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 16px currentColor;
      opacity: 0.95;
    }

    .stat-value {
      width: 100%;
      margin-top: 12px;
      color: currentColor;
      font-size: 54px;
      font-weight: 1000;
      line-height: 0.95;
      text-align: center;
      text-shadow: 0 0 14px rgba(255,255,255,0.05);
      margin-left: auto;
      margin-right: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .battles {
      color: var(--cyan);
      background: linear-gradient(180deg, var(--cyan-soft), rgba(255,255,255,0.02));
    }

    .rate {
      color: var(--blue);
      background: linear-gradient(180deg, var(--blue-soft), rgba(255,255,255,0.02));
    }

    .wins {
      color: var(--green);
      background: linear-gradient(180deg, var(--green-soft), rgba(255,255,255,0.02));
    }

    .losses {
      color: var(--red);
      background: linear-gradient(180deg, var(--red-soft), rgba(255,255,255,0.02));
    }

    .gold-block {
      position: relative;
      min-height: 168px;
      margin-top: 16px;
      padding: 24px 22px 18px;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 153, 0, 0.22);
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 184, 0, 0.14), transparent 28%),
        radial-gradient(circle at 88% 75%, rgba(255, 106, 0, 0.15), transparent 30%),
        linear-gradient(180deg, rgba(255, 144, 0, 0.14), rgba(255, 108, 0, 0.08));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 0 24px rgba(255, 136, 0, 0.08);
    }

    .gold-block::before {
      content: "";
      position: absolute;
      right: -24px;
      bottom: -26px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 1px solid rgba(255, 170, 0, 0.12);
      box-shadow:
        0 0 0 18px rgba(255, 170, 0, 0.03),
        0 0 0 36px rgba(255, 170, 0, 0.015);
    }

    .gold-label {
      color: #ffd079;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-align: center;
      text-transform: uppercase;
    }

    .gold-value {
      width: 100%;
      margin-top: 22px;
      color: #ffffff;
      font-size: 92px;
      font-weight: 1000;
      letter-spacing: 1px;
      line-height: 0.95;
      text-align: center;
      text-shadow:
        0 0 18px rgba(255,255,255,0.07),
        0 0 22px rgba(255, 166, 0, 0.10);
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(90, 10, 18, 0.82);
      color: #ffbbc4;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="wrap">

      <div class="kicker" id="blockTitle">
        WORLD OF TANKS • БИТВА ВЗВОДІВ
      </div>

      <div class="header">
        <div class="title" id="streamTitle">
          ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ
        </div>

        <div class="map-pill">
          🗺️
          <span id="mapTitle">ХІММЕЛЬСДОРФ</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card battles">
          <div class="stat-header">
            <div class="stat-title">Кількість боїв</div>
            <div class="mini-dot"></div>
          </div>
          <div class="stat-value" id="battles">0</div>
        </div>

        <div class="stat-card rate">
          <div class="stat-header">
            <div class="stat-title">Відсоток перемог</div>
            <div class="mini-dot"></div>
          </div>
          <div class="stat-value" id="winRate">0%</div>
        </div>

        <div class="stat-card wins">
          <div class="stat-header">
            <div class="stat-title">Наші перемоги</div>
            <div class="mini-dot"></div>
          </div>
          <div class="stat-value" id="wins">0</div>
        </div>

        <div class="stat-card losses">
          <div class="stat-header">
            <div class="stat-title">Наші поразки</div>
            <div class="mini-dot"></div>
          </div>
          <div class="stat-value" id="losses">0</div>
        </div>
      </div>

      <div class="gold-block">
        <div class="gold-label">Золота переможцям</div>
        <div class="gold-value" id="gold">0</div>
      </div>

      <div class="error" id="error"></div>

    </div>
  </div>

  <script>
    (() => {
      const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
      const INPUT_SHEET_GID = "703438953";
      const GOLD_PER_LOSS = 1500;

      let refreshMs = 5000;
      let refreshTimer = null;

      const el = (id) => document.getElementById(id);

      function loadGoogleSheetJsonp() {
        return new Promise((resolve, reject) => {
          const callbackName = `__wotStatsOverlay_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const script = document.createElement("script");
          let finished = false;

          const cleanup = () => {
            if (finished) return;
            finished = true;
            clearTimeout(timer);
            script.remove();

            try {
              delete window[callbackName];
            } catch {
              window[callbackName] = undefined;
            }
          };

          window[callbackName] = (data) => {
            cleanup();
            resolve(data);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error("Google Sheets недоступний"));
          };

          const timer = setTimeout(() => {
            cleanup();
            reject(new Error("Google Sheets не відповів"));
          }, 12000);

          const tqx = `out:json;responseHandler:${callbackName}`;

          script.src =
            `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
            `?tqx=${encodeURIComponent(tqx)}` +
            `&gid=${encodeURIComponent(INPUT_SHEET_GID)}` +
            `&range=${encodeURIComponent("A1:C30")}` +
            `&headers=0` +
            `&_=${Date.now()}`;

          document.head.appendChild(script);
        });
      }

      function cellValue(cell) {
        if (!cell) return "";

        if (cell.f !== undefined && cell.f !== null && String(cell.f).trim() !== "") {
          return cell.f;
        }

        if (cell.v !== undefined && cell.v !== null) {
          return cell.v;
        }

        return "";
      }

      function rowsToGrid(data) {
        return (data?.table?.rows || []).map((row) => (row.c || []).map(cellValue));
      }

      function setting(grid, name, fallback = "") {
        const wanted = String(name).trim().toUpperCase();

        for (const row of grid) {
          const key = String(row?.[0] ?? "").trim().toUpperCase();

          if (key === wanted) {
            const value = row?.[1];

            if (value === undefined || value === null || String(value).trim() === "") {
              return fallback;
            }

            return value;
          }
        }

        return fallback;
      }

      function toNumber(value, fallback = 0) {
        const normalized = String(value ?? "")
          .replace(/\s/g, "")
          .replace(",", ".")
          .replace(/[^0-9.+-]/g, "");

        const number = Number(normalized);
        return Number.isFinite(number) ? number : fallback;
      }

      function formatInteger(value) {
        return Math.round(value).toLocaleString("uk-UA");
      }

      function formatPercent(value) {
        const rounded = Math.round(value * 10) / 10;
        return (Number.isInteger(rounded) ? rounded.toFixed(0) : rounded.toFixed(1)) + "%";
      }

      function applyTitleSize(title) {
        const titleElement = el("streamTitle");
        titleElement.classList.toggle("long-title", title.length > 22);
      }

      async function refresh() {
        try {
          const data = await loadGoogleSheetJsonp();
          const grid = rowsToGrid(data);

          const mapTitle = String(setting(grid, "MAP", "ХІММЕЛЬСДОРФ")).trim() || "ХІММЕЛЬСДОРФ";
          const streamTitle = String(setting(grid, "STREAM_TITLE", "ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ")).trim() || "ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ";
          const blockTitle = String(setting(grid, "BLOCK_TITLE", "WORLD OF TANKS • БИТВА ВЗВОДІВ")).trim() || "WORLD OF TANKS • БИТВА ВЗВОДІВ";

          const wins = Math.max(0, toNumber(setting(grid, "WINS", 0)));
          const losses = Math.max(0, toNumber(setting(grid, "LOSSES", 0)));

          const battles = wins + losses;
          const winRate = battles > 0 ? (wins / battles) * 100 : 0;
          const gold = losses * GOLD_PER_LOSS;

          const refreshSeconds = Math.min(
            60,
            Math.max(3, toNumber(setting(grid, "AUTO_REFRESH_SECONDS", 5), 5))
          );

          refreshMs = refreshSeconds * 1000;

          el("blockTitle").textContent = blockTitle;
          el("streamTitle").textContent = streamTitle;
          applyTitleSize(streamTitle);

          el("mapTitle").textContent = mapTitle;

          el("battles").textContent = formatInteger(battles);
          el("wins").textContent = formatInteger(wins);
          el("losses").textContent = formatInteger(losses);
          el("winRate").textContent = formatPercent(winRate);
          el("gold").textContent = formatInteger(gold);

          el("error").style.display = "none";
          el("error").textContent = "";
        } catch (error) {
          el("error").textContent = `Помилка отримання даних: ${error.message}`;
          el("error").style.display = "block";
        } finally {
          clearTimeout(refreshTimer);
          refreshTimer = setTimeout(refresh, refreshMs);
        }
      }

      refresh();
    })();
  </script>
</body>
</html>
