<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoT Platoon Cup Stats Overlay v2</title>
  <style>
    :root {
      --bg: rgba(7, 12, 18, .88);
      --panel: rgba(16, 27, 38, .94);
      --line: rgba(255, 138, 0, .62);
      --orange: #ff8a00;
      --cyan: #40e0d0;
      --green: #70e000;
      --red: #ff4d4d;
      --gold: #ffd45a;
      --blue: #77a8ff;
      --text: #f6f8fb;
      --muted: #aab7c4;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    body { font-family: Arial, Helvetica, sans-serif; color: var(--text); }
    .widget {
      width: 990px;
      min-height: 228px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, var(--panel), var(--bg));
      box-shadow: 0 0 24px rgba(255, 138, 0, .28), inset 0 0 24px rgba(255,255,255,.035);
      position: relative;
      overflow: hidden;
    }
    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0 53%, rgba(255,138,0,.08) 53% 54%, transparent 54% 100%);
      pointer-events: none;
    }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; position:relative; z-index:1; }
    .eyebrow { font-size: 13px; letter-spacing: 2px; color: var(--muted); font-weight: 800; text-transform: uppercase; }
    .title { margin-top: 5px; font-size: 29px; line-height: 1; font-weight: 1000; text-transform: uppercase; text-shadow: 0 0 13px rgba(255,138,0,.35); }
    .round { min-width: 182px; text-align:center; padding:10px 14px; border-radius:17px; background:rgba(255,138,0,.10); border:1px solid rgba(255,138,0,.48); }
    .round-label { color:var(--muted); font-size:12px; letter-spacing:1.5px; font-weight:800; }
    .round-value { margin-top:3px; color:var(--orange); font-size:34px; line-height:1; font-weight:1000; text-transform:uppercase; }
    .stats { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-top:19px; position:relative; z-index:1; }
    .stat { padding:12px 8px 11px; min-height:91px; border-radius:15px; text-align:center; background:rgba(255,255,255,.052); border:1px solid rgba(255,255,255,.10); }
    .stat .label { color:var(--muted); font-size:12px; letter-spacing:.8px; font-weight:900; text-transform:uppercase; line-height:1.15; min-height:28px; display:flex; align-items:center; justify-content:center; }
    .stat .value { margin-top:5px; font-size:35px; line-height:1; font-weight:1000; }
    .battle .value { color:var(--cyan); }
    .wins .value { color:var(--green); }
    .losses .value { color:var(--red); }
    .winrate .value { color:var(--blue); }
    .gold .value { color:var(--gold); text-shadow:0 0 12px rgba(255,212,90,.22); }
    .error { display:none; margin-top:10px; position:relative; z-index:1; color:#ff9b9b; font-size:12px; font-weight:800; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="top">
      <div>
        <div class="eyebrow" id="blockTitle">WORLD OF TANKS • БИТВА ВЗВОДІВ</div>
        <div class="title" id="streamTitle">ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ</div>
      </div>
      <div class="round">
        <div class="round-label">ПОТОЧНИЙ ТУР</div>
        <div class="round-value" id="roundTitle">ТУР 1</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat battle"><div class="label">Зіграно боїв</div><div class="value" id="battles">0</div></div>
      <div class="stat wins"><div class="label">Наші перемоги</div><div class="value" id="wins">0</div></div>
      <div class="stat losses"><div class="label">Наші поразки</div><div class="value" id="losses">0</div></div>
      <div class="stat winrate"><div class="label">Відсоток перемог</div><div class="value" id="winRate">0%</div></div>
      <div class="stat gold"><div class="label">Золота переможцям</div><div class="value" id="gold">0</div></div>
    </div>

    <div class="error" id="error"></div>
  </div>

<script>
(() => {
  const SHEET_ID = '17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk';
  const INPUT_SHEET_GID = '703438953'; // аркуш 33
  const GOLD_PER_LOSS = 1500;
  let refreshMs = 5000;
  let refreshTimer = null;

  const el = id => document.getElementById(id);

  function loadGoogleSheetJsonp() {
    return new Promise((resolve, reject) => {
      const callbackName = `__wotStatsOverlay_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script = document.createElement('script');
      let finished = false;
      const cleanup = () => {
        if (finished) return;
        finished = true;
        clearTimeout(timer);
        script.remove();
        try { delete window[callbackName]; } catch { window[callbackName] = undefined; }
      };
      window[callbackName] = data => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('Google Sheets недоступний')); };
      const timer = setTimeout(() => { cleanup(); reject(new Error('Google Sheets не відповів')); }, 12000);
      const tqx = `out:json;responseHandler:${callbackName}`;
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=${encodeURIComponent(tqx)}&gid=${encodeURIComponent(INPUT_SHEET_GID)}&range=${encodeURIComponent('A1:C30')}&headers=0&_=${Date.now()}`;
      document.head.appendChild(script);
    });
  }

  function cellValue(cell) {
    if (!cell) return '';
    const formatted = cell.f;
    const raw = cell.v;
    if (formatted !== undefined && formatted !== null && String(formatted).trim() !== '') return formatted;
    if (raw !== undefined && raw !== null) return raw;
    return '';
  }

  function rowsToGrid(data) {
    return (data?.table?.rows || []).map(row => (row.c || []).map(cellValue));
  }

  function setting(grid, name, fallback = '') {
    const wanted = String(name).trim().toUpperCase();
    for (const row of grid) {
      if (String(row?.[0] ?? '').trim().toUpperCase() === wanted) {
        const value = row?.[1];
        return value === undefined || value === null || String(value).trim() === '' ? fallback : value;
      }
    }
    return fallback;
  }

  function toNumber(value, fallback = 0) {
    const normalized = String(value ?? '')
      .replace(/\s/g, '')
      .replace(',', '.')
      .replace(/[^0-9.+-]/g, '');
    const number = Number(normalized);
    return Number.isFinite(number) ? number : fallback;
  }

  function formatInteger(value) {
    return Math.round(value).toLocaleString('uk-UA');
  }

  function formatPercent(value) {
    const rounded = Math.round(value * 10) / 10;
    return `${Number.isInteger(rounded) ? rounded.toFixed(0) : rounded.toFixed(1)}%`;
  }

  async function refresh() {
    try {
      const grid = rowsToGrid(await loadGoogleSheetJsonp());
      const roundTitle = String(setting(grid, 'ROUND_TITLE', 'ТУР 1')).trim() || 'ТУР 1';
      const wins = Math.max(0, toNumber(setting(grid, 'WINS', 0)));
      const losses = Math.max(0, toNumber(setting(grid, 'LOSSES', 0)));
      const battles = wins + losses;
      const winRate = battles > 0 ? (wins / battles) * 100 : 0;
      const gold = losses * GOLD_PER_LOSS;
      const title = String(setting(grid, 'STREAM_TITLE', 'ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ')).trim() || 'ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ';
      const blockTitle = String(setting(grid, 'BLOCK_TITLE', 'WORLD OF TANKS • БИТВА ВЗВОДІВ')).trim() || 'WORLD OF TANKS • БИТВА ВЗВОДІВ';
      const refreshSeconds = Math.min(60, Math.max(3, toNumber(setting(grid, 'AUTO_REFRESH_SECONDS', 5), 5)));
      refreshMs = refreshSeconds * 1000;

      el('blockTitle').textContent = blockTitle;
      el('streamTitle').textContent = title;
      el('roundTitle').textContent = roundTitle;
      el('battles').textContent = formatInteger(battles);
      el('wins').textContent = formatInteger(wins);
      el('losses').textContent = formatInteger(losses);
      el('winRate').textContent = formatPercent(winRate);
      el('gold').textContent = formatInteger(gold);
      el('error').style.display = 'none';
      el('error').textContent = '';
    } catch (error) {
      el('error').textContent = `Помилка отримання даних: ${error.message}`;
      el('error').style.display = 'block';
    } finally {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refresh, refreshMs);
    }
  }

  refresh();
})();
</script>
</body>
</html>
