<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoT Platoon Cup Stats Overlay v3</title>
  <style>
    :root {
      --orange: #ff8a00;
      --orange-soft: rgba(255, 138, 0, .18);
      --cyan: #42e8df;
      --green: #79ef00;
      --red: #ff5266;
      --blue: #76a7ff;
      --gold: #ffd04f;
      --text: #f8fbff;
      --muted: #aebdcd;
      --panel: rgba(11, 19, 28, .94);
      --panel-2: rgba(21, 32, 43, .92);
      --border: rgba(255, 138, 0, .58);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }
    body {
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .widget {
      width: 1180px;
      min-height: 270px;
      position: relative;
      overflow: hidden;
      padding: 18px;
      border: 2px solid var(--border);
      border-radius: 26px;
      background:
        radial-gradient(circle at 12% 0%, rgba(37, 89, 120, .24), transparent 42%),
        linear-gradient(145deg, rgba(16, 27, 38, .97), rgba(6, 11, 17, .94));
      box-shadow:
        0 0 34px rgba(255, 138, 0, .24),
        inset 0 1px 0 rgba(255,255,255,.05);
    }

    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(118deg, transparent 0 37%, rgba(255,138,0,.055) 37.2% 38%, transparent 38.2% 100%),
        linear-gradient(118deg, transparent 0 72%, rgba(255,255,255,.025) 72.1% 72.5%, transparent 72.7% 100%);
      pointer-events: none;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title {
      margin-top: 5px;
      font-size: 34px;
      line-height: 1;
      font-weight: 1000;
      letter-spacing: .4px;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255,138,0,.30);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 5px 11px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      color: #dbe7f3;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .2px;
    }

    .chip .chip-label { color: var(--muted); }
    .chip.map { border-color: rgba(66,232,223,.25); background: rgba(66,232,223,.07); }

    .round {
      min-width: 190px;
      padding: 12px 16px;
      border-radius: 19px;
      border: 1px solid rgba(255,138,0,.55);
      background: linear-gradient(145deg, rgba(255,138,0,.15), rgba(255,138,0,.07));
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .round-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .round-value {
      margin-top: 5px;
      color: var(--orange);
      font-size: 38px;
      line-height: 1;
      font-weight: 1000;
      text-transform: uppercase;
      text-shadow: 0 0 13px rgba(255,138,0,.28);
    }

    .stats {
      display: grid;
      grid-template-columns: 1.08fr 1fr 1fr 1.12fr 1.22fr;
      gap: 11px;
      margin-top: 19px;
      position: relative;
      z-index: 1;
    }

    .stat {
      position: relative;
      min-height: 103px;
      overflow: hidden;
      padding: 13px 12px 12px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 17px;
      background: linear-gradient(145deg, rgba(255,255,255,.065), rgba(255,255,255,.035));
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.035);
    }

    .stat::after {
      content: "";
      position: absolute;
      left: 13px;
      right: 13px;
      bottom: 0;
      height: 3px;
      border-radius: 999px 999px 0 0;
      opacity: .78;
      background: currentColor;
    }

    .label {
      min-height: 29px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.12;
      font-weight: 1000;
      letter-spacing: .9px;
      text-transform: uppercase;
    }

    .value {
      margin-top: 7px;
      font-size: 38px;
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
    }

    .battle { color: var(--cyan); }
    .wins { color: var(--green); }
    .losses { color: var(--red); }
    .winrate { color: var(--blue); }
    .gold { color: var(--gold); }
    .gold .value { font-size: 35px; text-shadow: 0 0 13px rgba(255,208,79,.24); }

    .error {
      display: none;
      margin-top: 10px;
      position: relative;
      z-index: 1;
      color: #ff9eaa;
      font-size: 12px;
      font-weight: 900;
    }

    @media (max-width: 1180px) {
      .widget { transform-origin: top left; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="top">
      <div>
        <div class="eyebrow" id="blockTitle">WORLD OF TANKS • БИТВА ВЗВОДІВ</div>
        <div class="title" id="streamTitle">ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ</div>
        <div class="meta-row">
          <div class="chip map"><span>🗺️</span><span class="chip-label">Карта:</span><span id="mapTitle">ХІММЕЛЬСДОРФ</span></div>
        </div>
      </div>
      <div class="round">
        <div class="round-label">Поточний тур</div>
        <div class="round-value" id="roundTitle">ТУР 1</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat battle"><div class="label">Зіграно боїв</div><div class="value" id="battles">0</div></div>
      <div class="stat wins"><div class="label">Наші перемоги</div><div class="value" id="wins">0</div></div>
      <div class="stat losses"><div class="label">Наші поразки</div><div class="value" id="losses">0</div></div>
      <div class="stat winrate"><div class="label">Відсоток перемог</div><div class="value" id="winRate">0%</div></div>
      <div class="stat gold"><div class="label">Золота переможцям</div><div class="value" id="gold">0</div></div>
    </div>

    <div class="error" id="error"></div>
  </div>

<script>
(() => {
  const SHEET_ID = '17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk';
  const INPUT_SHEET_GID = '703438953'; // аркуш 33
  const GOLD_PER_LOSS = 1500;
  let refreshMs = 5000;
  let refreshTimer = null;

  const el = id => document.getElementById(id);

  function loadGoogleSheetJsonp() {
    return new Promise((resolve, reject) => {
      const callbackName = `__wotStatsOverlay_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script = document.createElement('script');
      let finished = false;
      const cleanup = () => {
        if (finished) return;
        finished = true;
        clearTimeout(timer);
        script.remove();
        try { delete window[callbackName]; } catch { window[callbackName] = undefined; }
      };
      window[callbackName] = data => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('Google Sheets недоступний')); };
      const timer = setTimeout(() => { cleanup(); reject(new Error('Google Sheets не відповів')); }, 12000);
      const tqx = `out:json;responseHandler:${callbackName}`;
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=${encodeURIComponent(tqx)}&gid=${encodeURIComponent(INPUT_SHEET_GID)}&range=${encodeURIComponent('A1:C30')}&headers=0&_=${Date.now()}`;
      document.head.appendChild(script);
    });
  }

  function cellValue(cell) {
    if (!cell) return '';
    if (cell.f !== undefined && cell.f !== null && String(cell.f).trim() !== '') return cell.f;
    if (cell.v !== undefined && cell.v !== null) return cell.v;
    return '';
  }

  function rowsToGrid(data) {
    return (data?.table?.rows || []).map(row => (row.c || []).map(cellValue));
  }

  function setting(grid, name, fallback = '') {
    const wanted = String(name).trim().toUpperCase();
    for (const row of grid) {
      if (String(row?.[0] ?? '').trim().toUpperCase() === wanted) {
        const value = row?.[1];
        return value === undefined || value === null || String(value).trim() === '' ? fallback : value;
      }
    }
    return fallback;
  }

  function toNumber(value, fallback = 0) {
    const normalized = String(value ?? '')
      .replace(/\s/g, '')
      .replace(',', '.')
      .replace(/[^0-9.+-]/g, '');
    const number = Number(normalized);
    return Number.isFinite(number) ? number : fallback;
  }

  function formatInteger(value) {
    return Math.round(value).toLocaleString('uk-UA');
  }

  function formatPercent(value) {
    const rounded = Math.round(value * 10) / 10;
    return `${Number.isInteger(rounded) ? rounded.toFixed(0) : rounded.toFixed(1)}%`;
  }

  async function refresh() {
    try {
      const grid = rowsToGrid(await loadGoogleSheetJsonp());
      const roundTitle = String(setting(grid, 'ROUND_TITLE', 'ТУР 1')).trim() || 'ТУР 1';
      const mapTitle = String(setting(grid, 'MAP', 'ХІММЕЛЬСДОРФ')).trim() || 'ХІММЕЛЬСДОРФ';
      const wins = Math.max(0, toNumber(setting(grid, 'WINS', 0)));
      const losses = Math.max(0, toNumber(setting(grid, 'LOSSES', 0)));
      const battles = wins + losses;
      const winRate = battles > 0 ? (wins / battles) * 100 : 0;
      const gold = losses * GOLD_PER_LOSS;
      const title = String(setting(grid, 'STREAM_TITLE', 'ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ')).trim() || 'ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ';
      const blockTitle = String(setting(grid, 'BLOCK_TITLE', 'WORLD OF TANKS • БИТВА ВЗВОДІВ')).trim() || 'WORLD OF TANKS • БИТВА ВЗВОДІВ';
      const refreshSeconds = Math.min(60, Math.max(3, toNumber(setting(grid, 'AUTO_REFRESH_SECONDS', 5), 5)));
      refreshMs = refreshSeconds * 1000;

      el('blockTitle').textContent = blockTitle;
      el('streamTitle').textContent = title;
      el('mapTitle').textContent = mapTitle;
      el('roundTitle').textContent = roundTitle;
      el('battles').textContent = formatInteger(battles);
      el('wins').textContent = formatInteger(wins);
      el('losses').textContent = formatInteger(losses);
      el('winRate').textContent = formatPercent(winRate);
      el('gold').textContent = formatInteger(gold);
      el('error').style.display = 'none';
      el('error').textContent = '';
    } catch (error) {
      el('error').textContent = `Помилка отримання даних: ${error.message}`;
      el('error').style.display = 'block';
    } finally {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refresh, refreshMs);
    }
  }

  refresh();
})();
</script>
</body>
</html>
