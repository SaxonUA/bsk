<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoT Platoon Cup Stats Overlay v1</title>
  <style>
    :root {
      --bg: rgba(7, 12, 18, .88);
      --panel: rgba(16, 27, 38, .94);
      --line: rgba(255, 138, 0, .62);
      --orange: #ff8a00;
      --cyan: #40e0d0;
      --green: #70e000;
      --red: #ff4d4d;
      --gold: #ffd45a;
      --text: #f6f8fb;
      --muted: #aab7c4;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    body { font-family: Arial, Helvetica, sans-serif; color: var(--text); }
    .widget {
      width: 760px;
      min-height: 245px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, var(--panel), var(--bg));
      box-shadow: 0 0 24px rgba(255, 138, 0, .28), inset 0 0 24px rgba(255,255,255,.035);
      position: relative;
      overflow: hidden;
    }
    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0 53%, rgba(255,138,0,.08) 53% 54%, transparent 54% 100%);
      pointer-events: none;
    }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; position:relative; z-index:1; }
    .eyebrow { font-size: 13px; letter-spacing: 2px; color: var(--muted); font-weight: 800; }
    .title { margin-top: 3px; font-size: 28px; line-height: 1; font-weight: 1000; text-transform: uppercase; text-shadow: 0 0 13px rgba(255,138,0,.35); }
    .map { margin-top: 8px; display:inline-flex; gap:7px; align-items:center; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.06); color:#dbe5ee; font-size:14px; font-weight:800; }
    .round { min-width: 178px; text-align:center; padding:10px 14px; border-radius:17px; background:rgba(255,138,0,.10); border:1px solid rgba(255,138,0,.48); }
    .round-label { color:var(--muted); font-size:12px; letter-spacing:1.5px; font-weight:800; }
    .round-value { margin-top:3px; color:var(--orange); font-size:34px; line-height:1; font-weight:1000; }
    .stats { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-top:16px; position:relative; z-index:1; }
    .stat { padding:11px 8px 10px; min-height:84px; border-radius:15px; text-align:center; background:rgba(255,255,255,.052); border:1px solid rgba(255,255,255,.10); }
    .stat .label { color:var(--muted); font-size:12px; letter-spacing:.9px; font-weight:900; text-transform:uppercase; }
    .stat .value { margin-top:4px; font-size:34px; line-height:1; font-weight:1000; }
    .battle .value { color:var(--cyan); }
    .wins .value { color:var(--green); }
    .losses .value { color:var(--red); }
    .gold .value { color:var(--gold); text-shadow:0 0 12px rgba(255,212,90,.22); }
    .bottom { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:13px; position:relative; z-index:1; }
    .progress { flex:1; height:12px; overflow:hidden; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.10); }
    .progress > div { height:100%; width:0%; border-radius:inherit; background:linear-gradient(90deg, var(--orange), #ffc15c); transition:width .45s ease; }
    .status { color:var(--muted); font-size:13px; font-weight:800; white-space:nowrap; }
    .status strong { color:#fff; }
    .error { color:#ff9b9b; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="top">
      <div>
        <div class="eyebrow">WORLD OF TANKS • БИТВА ВЗВОДІВ</div>
        <div class="title" id="streamTitle">ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ</div>
        <div class="map">🗺️ Карта: <span id="mapName">ХІММЕЛЬСДОРФ</span></div>
      </div>
      <div class="round">
        <div class="round-label">ПОТОЧНИЙ ЕТАП</div>
        <div class="round-value" id="roundTitle">ТУР 1</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat battle"><div class="label">Бої у турі</div><div class="value" id="battles">0 / 10</div></div>
      <div class="stat wins"><div class="label">Наші перемоги</div><div class="value" id="wins">0</div></div>
      <div class="stat losses"><div class="label">Наші поразки</div><div class="value" id="losses">0</div></div>
      <div class="stat gold"><div class="label">Золота переможцям</div><div class="value" id="gold">0</div></div>
    </div>

    <div class="bottom">
      <div class="progress"><div id="progressBar"></div></div>
      <div class="status" id="status">Завантаження даних…</div>
    </div>
  </div>

<script>
(() => {
  const SHEET_ID = '17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk';
  const INPUT_SHEET_GID = '703438953'; // аркуш 33
  const GOLD_PER_LOSS = 500;
  let refreshMs = 5000;
  let refreshTimer = null;

  const el = id => document.getElementById(id);

  function loadGoogleSheetJsonp() {
    return new Promise((resolve, reject) => {
      const callbackName = `__wotStatsOverlay_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script = document.createElement('script');
      let finished = false;
      const cleanup = () => {
        if (finished) return;
        finished = true;
        clearTimeout(timer);
        script.remove();
        try { delete window[callbackName]; } catch { window[callbackName] = undefined; }
      };
      window[callbackName] = data => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('Google Sheets недоступний')); };
      const timer = setTimeout(() => { cleanup(); reject(new Error('Google Sheets не відповів')); }, 12000);
      const tqx = `out:json;responseHandler:${callbackName}`;
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=${encodeURIComponent(tqx)}&gid=${encodeURIComponent(INPUT_SHEET_GID)}&range=${encodeURIComponent('A1:C50')}&headers=1&_=${Date.now()}`;
      document.head.appendChild(script);
    });
  }

  function cellValue(cell) {
    if (!cell) return '';
    return cell.v ?? cell.f ?? '';
  }

  function rowsToGrid(data) {
    return (data.table.rows || []).map(row => (row.c || []).map(cellValue));
  }

  function setting(grid, name, fallback = '') {
    for (const row of grid) {
      if (String(row[0] ?? '').trim().toUpperCase() === name.toUpperCase()) return row[1] ?? fallback;
    }
    return fallback;
  }

  function toNumber(value, fallback = 0) {
    const n = Number(String(value).replace(',', '.'));
    return Number.isFinite(n) ? n : fallback;
  }

  function formatNumber(value) {
    return Math.round(value).toLocaleString('uk-UA');
  }

  async function refresh() {
    const status = el('status');
    try {
      const grid = rowsToGrid(await loadGoogleSheetJsonp());

      const roundTitle = String(setting(grid, 'ROUND_TITLE', 'ТУР 1')).trim() || 'ТУР 1';
      const totalPlanned = Math.max(1, toNumber(setting(grid, 'ROUND_BATTLES_TOTAL', 10), 10));
      const wins = Math.max(0, toNumber(setting(grid, 'WINS', 0)));
      const losses = Math.max(0, toNumber(setting(grid, 'LOSSES', 0)));
      const battles = wins + losses;
      const gold = losses * GOLD_PER_LOSS;
      const title = String(setting(grid, 'STREAM_TITLE', 'ГЛЯДАЧІ ПРОТИ СТРІМЕРІВ')).trim();
      const map = String(setting(grid, 'MAP', 'ХІММЕЛЬСДОРФ')).trim();
      const refreshSeconds = Math.min(60, Math.max(3, toNumber(setting(grid, 'AUTO_REFRESH_SECONDS', 5), 5)));
      refreshMs = refreshSeconds * 1000;

      el('roundTitle').textContent = roundTitle;
      el('battles').textContent = `${formatNumber(battles)} / ${formatNumber(totalPlanned)}`;
      el('wins').textContent = formatNumber(wins);
      el('losses').textContent = formatNumber(losses);
      el('gold').textContent = formatNumber(gold);
      el('streamTitle').textContent = title;
      el('mapName').textContent = map;
      el('progressBar').style.width = `${Math.min(100, Math.max(0, battles / totalPlanned * 100))}%`;
      status.className = 'status';
      status.innerHTML = `Оновлено: <strong>${new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</strong>`;
    } catch (error) {
      status.className = 'status error';
      status.textContent = `Немає даних: ${error.message}`;
    } finally {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refresh, refreshMs);
    }
  }

  refresh();
})();
</script>
</body>
</html>
